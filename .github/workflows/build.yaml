name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        mv cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_SDK_ROOT=$(pwd)/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
        yes | sdkmanager --licenses
        sdkmanager "build-tools;34.0.0" "platforms;android-34"
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/build-tools/34.0.0" >> $GITHUB_PATH

    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=$(pwd)/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/build-tools/34.0.0
        
        mkdir -p build/classes build/dex
        
        # کامپایل کدهای کاتلین
        echo "☕ Compiling Kotlin..."
        find app/src/main/java -name "*.kt" -exec kotlinc -d build/classes -cp "$ANDROID_SDK_ROOT/platforms/android-34/android.jar" {} +
        
        # تبدیل به DEX
        echo "📱 Converting to DEX..."
        d8 --lib $ANDROID_SDK_ROOT/platforms/android-34/android.jar \
          --output build/dex \
          --min-api 21 \
          build/classes/**/*.class
        
        # ساخت APK
        echo "📦 Creating APK..."
        cp $ANDROID_SDK_ROOT/platforms/android-34/android.jar build/dex/
        cd build/dex
        zip -r ../app.apk *
        cd ../..
        
        # امضا
        echo "🔑 Signing APK..."
        keytool -genkey -v -keystore debug.keystore \
          -alias debug -keyalg RSA -keysize 2048 \
          -validity 10000 -storepass android -keypass android \
          -dname "CN=Debug" -noprompt
        apksigner sign --ks debug.keystore \
          --ks-pass pass:android \
          --out VPS-OneClick.apk \
          build/app.apk
        
        echo "✅ Build complete!"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VPS-OneClick
        path: VPS-OneClick.apk
